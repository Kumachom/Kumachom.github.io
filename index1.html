<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>HTML練習</title>            <!--タブ名設定-->
    <link rel="stylesheet" href="index1.css" />
</head>

    <body>
        <h1>HTMLの練習サイト</h1>       <!--タイトル名設定-->
        <div class ="container">        <!--全体のレイアウトを左右に分ける-->
            <div class="form-box">      <!--左側:フォームボックス-->
                <label for="category">あいうえお</label>
                <select id="category">
                    <option value="カタカナ">ひらがな</option>
                </select>

                <label for="select">言語</label>
                <input type="text" id="select" placeholder="例:あかさたな" />

                <button onclick="addtext()">文字を追加</button>
                <button class ="reset-button" onclick="resettext()">リセット</button>
            </div> 

            <div class="display-area" id="textList">
                <h2>追加テキスト一覧</h2>
            </div>
        </div>

        

        <script src="index1.js"></script>
    </body>
</html>
