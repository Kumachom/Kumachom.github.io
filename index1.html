<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>HTML練習</title>            <!--タブ名設定-->
    <link rel="stylesheet" href="index1.css" />
</head>

    <body>
        <h1>HTMLの練習サイト</h1>       <!--タイトル名設定-->
        <div class ="container">        <!--全体のレイアウトを左右に分ける-->
            <div class="form-box">      <!--左側:フォームボックス-->
                <label for="category">言語選択</label>
                <select id="category">
                    <option value="ひらがな">ひらがな</option>
                    <option value="カタカナ">カタカナ</option>
                </select>

                <label for ="date">日付</label>
                <input type="date" id="date">
                
                <label for="inputText">入力</label>
                <input type="text" id="inputText" placeholder="例:あかさたな" />

                <button onclick="addtext()">文字を追加</button>
                <button class = "reset-button" onclick="resettext()">リセット</button>
            </div> 

            <div class="display-area" >
                <h2>追加テキスト一覧</h2>
                <div id="textList"></div>
            </div>
        </div>

        

        <script src="index1.js"></script>
    </body>
</html>
