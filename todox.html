<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>TODOリスト</title>
        <link rel="stylesheet" href="todox.css" />
    </head>

    <body>
        <h1>TODOリスト</h1>
        <div class="container">
            <div class="form-box">
                <label for="category">種類</label>
                <select id="category">
                    <option value="大学課題">大学課題</option>
                    <option value="就活">就活</option>
                    <option value=""その他">その他</option>
                </select>

                <label for="date">締切期限</label>
                <input type="date" id="date">

                <label for="inputTODO">入力</label>
                <input type="text" id="inputTODO" placeholder="例：レポート" />

                <button class="add-button" onclick="addTODO()">TODO追加</button>
                <button class="reset-button" onclick="resetTODO()">リセット</button>
            </div>

            <div class="display-area">
                <h2>TODOリスト</h2>
                <ul id="todoList"></ul>
            </div>
        </div>

        <script src="todox.js"></script>
    </body>
</html>
